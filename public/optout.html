<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odhlásenie z odberu — EMIL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      color: #1e293b;
    }
    .card {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 90%;
      text-align: center;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }
    p {
      font-size: 0.95rem;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .note {
      margin-top: 1.75rem;
      font-size: 0.82rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Boli ste odhlásení</h1>
    <p>Vaša emailová adresa bola úspešne odhlásená z odberu.</p>
    <p>Už vám nebudeme posielať ďalšie správy.</p>
    <p class="note">Ak ste klikli omylom alebo chcete zmeniť rozhodnutie, napíšte nám priamo na email.</p>
  </div>
</body>
</html>
